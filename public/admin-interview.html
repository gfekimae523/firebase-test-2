<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>面談管理 - 就労移行支援ポータル</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-body">
    <!-- サイドバー -->
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header" style="background-color: #1F2937;">
            <div class="logo" style="color: white;">🌟 Admin Portal</div>
        </div>
        <nav class="sidebar-nav">
            <a href="admin-dashboard.html" class="nav-item">ダッシュボード</a>
            <a href="admin-users.html" id="nav-admin-users" class="nav-item">ユーザー管理</a>
            <a href="admin-attendance.html" id="nav-admin-attendance" class="nav-item">
                通所予定管理
                <span id="badge-attendance" class="badge badge-danger hidden">0</span>
            </a>
            <a href="admin-interview.html" id="nav-admin-interview" class="nav-item active">
                面談管理
                <span id="badge-interview" class="badge badge-danger hidden">0</span>
            </a>
        </nav>
    </aside>

    <!-- メインコンテンツ -->
    <main class="main-content">
        <!-- ヘッダー -->
        <header class="top-header">
            <h2 class="page-title">面談管理</h2>
            <div class="user-profile">
                <span id="admin-name" class="user-name">読み込み中...</span>
                <button id="logout-btn" class="btn btn-outline btn-sm">ログアウト</button>
            </div>
        </header>

        <div class="content-wrapper">
            <!-- 申請中面談セクション -->
            <section id="interview-requests" class="dashboard-section card glass-card">
                <h3>⏳ 未対応の面談申請</h3>
                <ul id="pending-interview-requests" class="notification-list">
                    <!-- JSで動的に表示 -->
                </ul>
            </section>

            <!-- 確定済み面談セクション -->
            <section id="confirmed-interviews" class="dashboard-section card glass-card" style="margin-top: 24px;">
                <h3>📅 確定済みの面談</h3>
                <ul id="confirmed-interview-list" class="notification-list">
                    <!-- JSで動的に表示 -->
                </ul>
            </section>
        </div>
    </main>

    <!-- モーダル：申請確認・面談確定 -->
    <div id="interview-confirm-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <h3>面談の確定</h3>
            <div class="modal-body">
                <div id="interview-request-info" style="margin-bottom: 24px; padding: 12px; background: #F9FAFB; border-radius: 8px;">
                    <!-- JSで申請内容を表示 -->
                </div>
                <div class="form-group">
                    <label for="interview-date">確定する面談日時</label>
                    <input type="datetime-local" id="interview-date" class="form-control">
                </div>
                <div class="form-group">
                    <label for="staff-select">担当スタッフ</label>
                    <select id="staff-select" class="form-control">
                        <option value="">スタッフを選択</option>
                        <!-- adminロールから自動取得 -->
                    </select>
                </div>
                <hr style="margin: 24px 0;">
                <div class="form-group">
                    <label for="reject-comment">却下コメント (却下時に必須)</label>
                    <textarea id="reject-comment" class="form-control" rows="2"></textarea>
                </div>
            </div>
            <div class="modal-actions">
                <button id="cancel-confirm" class="btn btn-outline">キャンセル</button>
                <button id="reject-interview" class="btn btn-outline-danger">却下</button>
                <button id="create-interview" class="btn btn-primary">面談確定</button>
            </div>
        </div>
    </div>

    <!-- モーダル：確定面談の詳細・キャンセル -->
    <div id="interview-detail-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <h3>面談予定の詳細</h3>
            <div id="interview-info" class="modal-body">
                <!-- JSで表示 -->
            </div>
            <div class="modal-actions">
                <button id="close-detail" class="btn btn-outline">閉じる</button>
                <button id="cancel-interview" class="btn btn-outline-danger">面談キャンセル</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/admin-interview.js"></script>
</body>
</html>
