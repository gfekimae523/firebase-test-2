<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>利用者ダッシュボード - 就労移行支援ポータル</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-body">
    <!-- サイドバー -->
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <div class="logo">🌟 Portal</div>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item active">ダッシュボード</a>
            <a href="attendance.html" id="nav-attendance" class="nav-item">通所・タイムシート</a>
            <a href="interview.html" id="nav-interview" class="nav-item">面談</a>
        </nav>
    </aside>

    <!-- メインコンテンツ -->
    <main class="main-content">
        <!-- ヘッダー -->
        <header class="top-header">
            <h2 class="page-title">ダッシュボード</h2>
            <div class="user-profile">
                <span id="username" class="user-name">読み込み中...</span>
                <button id="logout-btn" class="btn btn-outline btn-sm">ログアウト</button>
            </div>
        </header>

        <!-- コンテンツエリア -->
        <div class="content-wrapper">
            <!-- お知らせ一覧 -->
            <section id="announcements" class="dashboard-section card glass-card">
                <h3>📢 お知らせ</h3>
                <ul class="notification-list" id="announcement-list">
                    <!-- JSで動的に追加 -->
                </ul>
            </section>

            <div class="dashboard-grid">
                <!-- 回答期限の近い申請 -->
                <section id="pending-requests" class="dashboard-section card glass-card">
                    <h3>⏳ 期限が近い申請</h3>
                    <div id="pending-requests-list" class="empty-state">
                        読み込み中...
                    </div>
                </section>

                <!-- 承認・却下通知 -->
                <section id="notifications" class="dashboard-section card glass-card">
                    <h3>🔔 通知（承認・却下）</h3>
                    <div id="notifications-list" class="empty-state">
                        読み込み中...
                    </div>
                </section>
            </div>
        </div>
    </main>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/dashboard.js"></script>
</body>
</html>
