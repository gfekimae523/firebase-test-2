<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>利用者ダッシュボード - 就労移行支援ポータル</title>
    <link rel="stylesheet" href="css/style.css">
    <script type="module" src="js/dashboard.js"></script>
</head>

<body>
    <header>
        <!-- 共通のヘッダー -->
    </header>

    <div class="layout-wrapper">
        <aside id="sidebar">
            <!-- 共通のサイドバー -->
        </aside>

        <main>
            <!-- お知らせ一覧表示 -->
            <section id="announcements">
                <h2>お知らせ</h2>
            </section>

            <!-- 回答期限の近い申請の通知表示 -->
            <section id="pending-requests">
                <h2>期限が近い申請</h2>
            </section>

            <!-- 新着承認・却下通知の表示 -->
            <section id="notifications">
                <h2>通知</h2>
            </section>
        </main>
    </div>

    <!-- 全ページ共通要素 -->
    <div id="loading-spinner" hidden></div>
    <div id="toast-container"></div>
    <div id="confirm-dialog" hidden></div>
</body>

</html>
