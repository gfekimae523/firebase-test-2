<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理者ダッシュボード - 就労移行支援ポータル</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-body">
    <!-- サイドバー -->
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header" style="background-color: #1F2937;">
            <div class="logo" style="color: white;">🌟 Admin Portal</div>
        </div>
        <nav class="sidebar-nav">
            <a href="admin-dashboard.html" class="nav-item active">ダッシュボード</a>
            <a href="admin-users.html" id="nav-admin-users" class="nav-item">ユーザー管理</a>
            <a href="admin-attendance.html" id="nav-admin-attendance" class="nav-item">
                通所予定管理
                <span id="badge-attendance" class="badge badge-danger hidden">0</span>
            </a>
            <a href="admin-interview.html" id="nav-admin-interview" class="nav-item">
                面談管理
                <span id="badge-interview" class="badge badge-danger hidden">0</span>
            </a>
        </nav>
    </aside>

    <!-- メインコンテンツ -->
    <main class="main-content">
        <!-- ヘッダー -->
        <header class="top-header">
            <h2 class="page-title">管理者ダッシュボード</h2>
            <div class="user-profile">
                <span id="admin-name" class="user-name">読み込み中...</span>
                <button id="logout-btn" class="btn btn-outline btn-sm">ログアウト</button>
            </div>
        </header>

        <!-- コンテンツエリア -->
        <div class="content-wrapper">
            <!-- お知らせ投稿・一覧 -->
            <section id="admin-announcements" class="dashboard-section card glass-card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                    <h3>📢 お知らせ管理</h3>
                    <button id="create-announcement-btn" class="btn btn-primary btn-sm">+ 新規投稿</button>
                </div>
                <ul id="announcement-list" class="notification-list">
                    <!-- JSで動的に表示 -->
                </ul>
            </section>

            <!-- 未確認申請一覧 -->
            <section id="pending-requests" class="dashboard-section card glass-card">
                <h3>🚨 未確認の申請</h3>
                <ul id="pending-request-list" class="notification-list">
                    <!-- JSで動的に表示 -->
                </ul>
            </section>
        </div>
    </main>

    <!-- モーダル: お知らせ投稿 -->
    <div id="announcement-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <h3>お知らせ投稿</h3>
            <div class="modal-body">
                <div class="form-group">
                    <label for="announcement-title">タイトル</label>
                    <input type="text" id="announcement-title" class="form-control" placeholder="例: タイムシート入力のお願い">
                </div>
                <div class="form-group">
                    <label for="announcement-body">本文</label>
                    <textarea id="announcement-body" class="form-control" rows="5"></textarea>
                </div>
            </div>
            <div class="modal-actions">
                <button id="cancel-announcement" class="btn btn-outline">キャンセル</button>
                <button id="submit-announcement" class="btn btn-primary">投稿</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/admin-dashboard.js"></script>
</body>
</html>
