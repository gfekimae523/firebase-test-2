<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>面談 - 就労移行支援ポータル</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-body">
    <!-- サイドバー -->
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <div class="logo">🌟 Portal</div>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">ダッシュボード</a>
            <a href="attendance.html" id="nav-attendance" class="nav-item">通所・タイムシート</a>
            <a href="interview.html" id="nav-interview" class="nav-item active">面談</a>
        </nav>
    </aside>

    <!-- メインコンテンツ -->
    <main class="main-content">
        <!-- ヘッダー -->
        <header class="top-header">
            <h2 class="page-title">面談</h2>
            <div class="user-profile">
                <span id="username" class="user-name">読み込み中...</span>
                <button id="logout-btn" class="btn btn-outline btn-sm">ログアウト</button>
            </div>
        </header>

        <!-- コンテンツエリア -->
        <div class="content-wrapper">
            <section id="interview-schedule" class="dashboard-section card glass-card">
                <h3>📅 確定した面談予定</h3>
                <ul id="confirmed-interviews" class="notification-list">
                    <!-- JSで動的に表示 -->
                </ul>
                
                <h3 style="margin-top: 24px;">⏳ 申請中の面談</h3>
                <ul id="pending-interviews" class="notification-list">
                    <!-- JSで動的に表示 -->
                </ul>
            </section>

            <section id="interview-actions" style="margin-top: 24px;">
                <button id="create-interview-request" class="btn btn-primary">面談を申請する</button>
            </section>
        </div>
    </main>

    <!-- モーダル: 面談申請作成 -->
    <div id="interview-request-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <h3>面談申請作成</h3>
            <div class="modal-body">
                <div class="form-group">
                    <label for="target-week">対象週選択（月曜日の日付）</label>
                    <input type="date" id="target-week" class="form-control">
                </div>
                <div class="form-group">
                    <label>空き状況・希望日時</label>
                    <div id="available-date-picker" class="checkbox-grid" style="margin-bottom: 8px;">
                        <!-- JSまたはHTMLで曜日ごとの選択肢を表示 -->
                        <p style="font-size: 0.85rem; color: var(--text-muted);">希望する曜日や時間帯を下の詳細欄に記入してください。</p>
                    </div>
                </div>
                <div class="form-group">
                    <label for="interview-content">面談内容・希望事項</label>
                    <textarea id="interview-content" class="form-control" rows="4" placeholder="相談したい内容や具体的な希望日時を入力してください。"></textarea>
                </div>
            </div>
            <div class="modal-actions">
                <button id="cancel-interview-request" class="btn btn-outline">キャンセル</button>
                <button id="submit-interview-request" class="btn btn-primary">申請送信</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/interview.js"></script>
</body>
</html>
