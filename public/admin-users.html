<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ユーザー管理 - 就労移行支援ポータル</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .data-table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        .data-table th, .data-table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #E5E7EB; }
        .data-table th { background-color: #F9FAFB; color: var(--text-muted); font-weight: 500; font-size: 13px; }
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .badge-user { background: #EEF2FF; color: var(--primary-color); }
        .badge-admin { background: #FEF2F2; color: #EF4444; }
    </style>
</head>
<body class="dashboard-body">
    <!-- サイドバー -->
    <aside class="sidebar">
        <div class="sidebar-header" style="background-color: #1F2937;">
            <div class="logo" style="color: white;">🌟 Admin Portal</div>
        </div>
        <nav class="sidebar-nav">
            <a href="admin-dashboard.html" class="nav-item">ダッシュボード</a>
            <a href="admin-users.html" class="nav-item active">ユーザー管理</a>
            <a href="admin-attendance.html" class="nav-item">通所予定管理</a>
            <a href="admin-interview.html" class="nav-item">面談管理</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-header" style="border-bottom-color: var(--primary-color);">
            <h2 class="page-title">ユーザー管理</h2>
            <div class="user-profile">
                <span id="user-name" class="user-name">管理者 読み込み中...</span>
                <button id="logout-btn" class="btn btn-outline btn-sm">ログアウト</button>
            </div>
        </header>

        <div class="content-wrapper">
            <section class="dashboard-section card glass-card">
                <div style="display: flex; justify-content: space-between; margin-bottom: 16px;">
                    <h3>👥 登録ユーザー一覧</h3>
                    <input type="text" class="form-control" placeholder="名前やメールで検索..." style="width: 250px;">
                </div>
                
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>名前</th>
                            <th>メールアドレス</th>
                            <th>権限</th>
                            <th>ステータス</th>
                            <th>アクション</th>
                        </tr>
                    </thead>
                    <tbody id="users-tbody">
                        <!-- ダミーデータ -->
                        <tr>
                            <td style="font-weight: 500;">山田 太郎</td>
                            <td style="color: var(--text-muted);">yamada@example.com</td>
                            <td><span class="badge badge-user">User</span></td>
                            <td>Active</td>
                            <td><button class="btn btn-outline btn-sm">詳細</button></td>
                        </tr>
                        <tr>
                            <td style="font-weight: 500;">管理者 次郎</td>
                            <td style="color: var(--text-muted);">admin@example.com</td>
                            <td><span class="badge badge-admin">Admin</span></td>
                            <td>Active</td>
                            <td><button class="btn btn-outline btn-sm">詳細</button></td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </div>
    </main>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/admin-dashboard.js"></script>
</body>
</html>
