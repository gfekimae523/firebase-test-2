<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通所予定 - 就労移行支援ポータル</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-body">
    <!-- サイドバー -->
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <div class="logo">🌟 Portal</div>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">ダッシュボード</a>
            <a href="attendance.html" id="nav-attendance" class="nav-item active">通所・タイムシート</a>
            <a href="interview.html" id="nav-interview" class="nav-item">面談</a>
        </nav>
    </aside>

    <!-- メインコンテンツ -->
    <main class="main-content">
        <!-- ヘッダー -->
        <header class="top-header">
            <h2 class="page-title">通所予定</h2>
            <div class="user-profile">
                <span id="username" class="user-name">読み込み中...</span>
                <button id="logout-btn" class="btn btn-outline btn-sm">ログアウト</button>
            </div>
        </header>

        <!-- コンテンツエリア -->
        <div class="content-wrapper">
            <!-- カレンダーセクション -->
            <section id="calendar-section" class="dashboard-section card glass-card">
                <div id="calendar-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                    <button id="prev-month-btn" class="btn btn-outline btn-sm">&lt;</button>
                    <span id="current-month" style="font-weight: 600; font-size: 1.2rem;">2026年4月</span>
                    <button id="next-month-btn" class="btn btn-outline btn-sm">&gt;</button>
                </div>
                <div id="calendar-grid" class="calendar-grid">
                    <!-- JSでカレンダーを描画 -->
                </div>
            </section>

            <!-- アクションセクション -->
            <section id="attendance-actions" style="margin-bottom: 24px;">
                <button id="btn-create-timesheet" class="btn btn-primary">タイムシート作成</button>
            </section>

            <!-- 申請一覧セクション -->
            <section id="request-list" class="dashboard-section card glass-card">
                <h3>📋 タイムシート申請状況</h3>
                <ul id="timesheet-request-list" class="notification-list">
                    <!-- JSで動的に表示 -->
                </ul>

                <h3 style="margin-top: 24px;">📋 通所変更申請状況</h3>
                <ul id="attendance-change-request-list" class="notification-list">
                    <!-- JSで動的に表示 -->
                </ul>
            </section>
        </div>
    </main>

    <!-- モーダル① 通所予定変更申請 -->
    <div id="attendance-change-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <h3>通所予定変更申請</h3>
            <div class="modal-body">
                <p>変更前日付: <span id="original-date">-</span></p>
                <div class="form-group">
                    <label for="request-type">申請種別</label>
                    <select id="request-type" class="form-control">
                        <option value="create">新規（通所追加）</option>
                        <option value="update">更新（時間変更）</option>
                        <option value="cancel">欠席（通所削除）</option>
                    </select>
                </div>
                <div id="change-inputs">
                    <div class="form-group">
                        <label for="new-date">変更後日付</label>
                        <input type="date" id="new-date" class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="new-start-time">開始時刻</label>
                        <input type="time" id="new-start-time" class="form-control" value="10:00">
                    </div>
                    <div class="form-group">
                        <label for="new-end-time">終了時刻</label>
                        <input type="time" id="new-end-time" class="form-control" value="15:00">
                    </div>
                </div>
                <div class="form-group">
                    <label for="change-reason">申請理由 (必須)</label>
                    <textarea id="change-reason" class="form-control" rows="3"></textarea>
                </div>
            </div>
            <div class="modal-actions">
                <button id="cancel-change-request" class="btn btn-outline">キャンセル</button>
                <button id="submit-change-request" class="btn btn-primary">申請送信</button>
            </div>
        </div>
    </div>

    <!-- モーダル② タイムシート作成 -->
    <div id="timesheet-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <h3>タイムシート作成</h3>
            <div class="modal-body">
                <div class="form-group">
                    <label for="target-month">対象月</label>
                    <input type="month" id="target-month" class="form-control">
                </div>
                <div id="timesheet-calendar" class="calendar-grid-small" style="margin-bottom: 16px;">
                    <!-- 対象月のカレンダーGUI -->
                </div>
                <div class="form-actions-inline" style="margin-bottom: 16px;">
                    <button id="fill-weekdays-btn" class="btn btn-outline btn-sm">平日一括入力</button>
                </div>
                <div class="form-group">
                    <label for="default-start-time">デフォルト開始時刻</label>
                    <input type="time" id="default-start-time" class="form-control" value="10:00">
                </div>
                <div class="form-group">
                    <label for="default-end-time">デフォルト終了時刻</label>
                    <input type="time" id="default-end-time" class="form-control" value="15:00">
                </div>
            </div>
            <div class="modal-actions">
                <button id="cancel-timesheet" class="btn btn-outline">キャンセル</button>
                <button id="submit-timesheet" class="btn btn-primary">申請送信</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/attendance.js"></script>
</body>
</html>
