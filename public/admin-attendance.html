<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通所予定管理 - 就労移行支援ポータル</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-body">
    <!-- サイドバー -->
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header" style="background-color: #1F2937;">
            <div class="logo" style="color: white;">🌟 Admin Portal</div>
        </div>
        <nav class="sidebar-nav">
            <a href="admin-dashboard.html" class="nav-item">ダッシュボード</a>
            <a href="admin-users.html" id="nav-admin-users" class="nav-item">ユーザー管理</a>
            <a href="admin-attendance.html" id="nav-admin-attendance" class="nav-item active">
                通所予定管理
                <span id="badge-attendance" class="badge badge-danger hidden">0</span>
            </a>
            <a href="admin-interview.html" id="nav-admin-interview" class="nav-item">
                面談管理
                <span id="badge-interview" class="badge badge-danger hidden">0</span>
            </a>
        </nav>
    </aside>

    <!-- メインコンテンツ -->
    <main class="main-content">
        <!-- ヘッダー -->
        <header class="top-header">
            <h2 class="page-title">通所予定管理</h2>
            <div class="user-profile">
                <span id="admin-name" class="user-name">読み込み中...</span>
                <button id="logout-btn" class="btn btn-outline btn-sm">ログアウト</button>
            </div>
        </header>

        <div class="content-wrapper">
            <!-- 利用者選択・印刷 -->
            <div id="user-selector" style="display: flex; gap: 16px; margin-bottom: 24px; align-items: center; flex-wrap: wrap;">
                <select id="user-select" class="form-control" style="width: 200px;">
                    <option value="">利用者を選択</option>
                </select>
                <button id="print-timesheet" class="btn btn-outline btn-sm">🖨️ タイムシートPDF出力</button>
            </div>

            <div class="dashboard-grid">
                <!-- 個別カレンダー -->
                <section id="calendar-section" class="dashboard-section card glass-card">
                    <div id="calendar-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                        <button id="prev-month" class="btn btn-outline btn-sm">&lt;</button>
                        <span id="current-month" style="font-weight: 600;">2026年4月</span>
                        <button id="next-month" class="btn btn-outline btn-sm">&gt;</button>
                    </div>
                    <div id="calendar-grid" class="calendar-grid">
                        <!-- JSでカレンダーを描画 -->
                    </div>
                </section>

                <div style="display: flex; flex-direction: column; gap: 24px;">
                    <!-- タイムシート申請 -->
                    <section id="timesheet-requests" class="dashboard-section card glass-card">
                        <h3>📋 タイムシート承認待ち</h3>
                        <ul id="timesheet-request-list" class="notification-list">
                            <!-- JSで動的に表示 -->
                        </ul>
                    </section>

                    <!-- 通所変更申請 -->
                    <section id="attendance-change-requests" class="dashboard-section card glass-card">
                        <h3>📋 通所変更申請</h3>
                        <ul id="attendance-change-request-list" class="notification-list">
                            <!-- JSで動的に表示 -->
                        </ul>
                    </section>
                </div>
            </div>
        </div>
    </main>

    <!-- モーダル：申請確認 -->
    <div id="request-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <h3>申請内容の確認</h3>
            <div class="modal-body">
                <div id="request-detail" style="margin-bottom: 16px; font-size: 0.95rem;">
                    <!-- JSで詳細を表示 -->
                </div>
                <div class="form-group">
                    <label for="admin-comment">却下理由・コメント (却下時に必須)</label>
                    <textarea id="admin-comment" class="form-control" rows="3"></textarea>
                </div>
            </div>
            <div class="modal-actions">
                <button id="cancel-request" class="btn btn-outline">キャンセル</button>
                <button id="reject-request" class="btn btn-outline-danger">却下</button>
                <button id="approve-request" class="btn btn-primary">承認</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/admin-attendance.js"></script>
</body>
</html>
