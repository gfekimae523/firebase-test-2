<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通所予定管理 - 就労移行支援ポータル</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .data-table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        .data-table th, .data-table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #E5E7EB; }
    </style>
</head>
<body class="dashboard-body">
    <!-- サイドバー -->
    <aside class="sidebar">
        <div class="sidebar-header" style="background-color: #1F2937;">
            <div class="logo" style="color: white;">🌟 Admin Portal</div>
        </div>
        <nav class="sidebar-nav">
            <a href="admin-dashboard.html" class="nav-item">ダッシュボード</a>
            <a href="admin-users.html" class="nav-item">ユーザー管理</a>
            <a href="admin-attendance.html" class="nav-item active">通所予定管理</a>
            <a href="admin-interview.html" class="nav-item">面談管理</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-header" style="border-bottom-color: var(--primary-color);">
            <h2 class="page-title">通所予定管理</h2>
            <div class="user-profile">
                <span id="user-name" class="user-name">管理者 読み込み中...</span>
                <button id="logout-btn" class="btn btn-outline btn-sm">ログアウト</button>
            </div>
        </header>

        <div class="content-wrapper">
            <div class="dashboard-grid">
                
                <section class="dashboard-section card glass-card">
                    <h3>🔔 未確認の申請</h3>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>申請者</th>
                                <th>種別</th>
                                <th>内容</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="pending-attendance-tbody">
                            <tr>
                                <td colspan="4" class="empty-state" style="text-align: center;">読み込み中...</td>
                            </tr>
                        </tbody>
                    </table>
                </section>

                <section class="dashboard-section card glass-card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                        <h3>📅 カレンダー（利用者別）</h3>
                        <select class="form-control" style="width: 200px;">
                            <option>全ての利用者</option>
                            <option>Aさん</option>
                            <option>Bさん</option>
                        </select>
                    </div>
                    <!-- カレンダーのモック -->
                    <div style="background: #F9FAFB; height: 200px; display: flex; align-items: center; justify-content: center; border-radius: 8px;">
                        利用者の通所状況がカレンダー形式で表示されます。
                    </div>
                    <div style="margin-top: 16px; text-align: right;">
                        <button class="btn btn-outline">🖨️ 一括印刷</button>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <!-- 承認モーダル -->
    <div id="approval-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <h3>申請内容の確認</h3>
            <div class="modal-body">
                <p><strong>申請者:</strong> Aさん</p>
                <p><strong>内容:</strong> タイムシート 4月分</p>
                <div style="margin-top: 16px;">
                    <label>コメント（必須ではありません）</label>
                    <textarea class="form-control" rows="2"></textarea>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-outline close-modal" data-target="approval-modal">閉じる</button>
                <button class="btn btn-outline" style="color: #EF4444; border-color: #EF4444;" onclick="alert('却下しました'); document.getElementById('approval-modal').classList.add('hidden')">却下</button>
                <button class="btn btn-primary" style="background-color: var(--primary-color); color: white;" onclick="alert('承認しました'); document.getElementById('approval-modal').classList.add('hidden')">承認する</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/admin-dashboard.js"></script>
    <script>
        document.querySelectorAll('.open-approval-modal').forEach(b => {
            b.addEventListener('click', () => document.getElementById('approval-modal').classList.remove('hidden'));
        });
        document.querySelectorAll('.close-modal').forEach(btn => {
            btn.addEventListener('click', (e) => document.getElementById(e.target.getAttribute('data-target')).classList.add('hidden'));
        });
    </script>
</body>
</html>
